; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter, extra scripting
;   Upload options: custom port, speed and extra flags
;   Library options: dependencies, extra library storages
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
src_dir = main
build_cache_dir = .pio/build_cache

[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = espidf
monitor_speed = 115200
debug_tool = esp-builtin
;enable this if you wanna upload over JTAG 
;upload_protocol = esp-builtin
build_type = debug
board_build.partitions = partition_table/partitionTable.csv
build_flags = ;-v
lib_compat_mode = off
lib_deps = 
            Embedded Template Library@^20.39.4

[env:qemu_front]
extends = env:esp32-s3-devkitm-1
build_flags = 
    ${env:esp32-s3-devkitm-1.build_flags}
    -D QEMU_SIMULATION
    -D QEMU_IS_FRONT

[env:qemu_rear]
extends = env:esp32-s3-devkitm-1
build_flags =
    ${env:esp32-s3-devkitm-1.build_flags}
    -D QEMU_SIMULATION

[env:ecu_physical]
extends = env:esp32-s3-devkitm-1
; Physical car build — reads real GPIO, no virtual state

[env:ecu_virtual_front]
extends = env:esp32-s3-devkitm-1
; QEMU/SIL front ECU — virtual safety switch injection + CAN 0x600 HAL
build_flags =
    ${env:esp32-s3-devkitm-1.build_flags}
    -D VIRTUAL_ENV
    -D QEMU_SIMULATION
    -D QEMU_IS_FRONT

[env:ecu_virtual_rear]
extends = env:esp32-s3-devkitm-1
; QEMU/SIL rear ECU — virtual safety switch injection + CAN 0x600 HAL
build_flags =
    ${env:esp32-s3-devkitm-1.build_flags}
    -D VIRTUAL_ENV
    -D QEMU_SIMULATION

